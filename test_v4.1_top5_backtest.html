<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>v4.1 Top5 回测</title>
<style>
body{font-family:monospace;background:#1a1a2e;color:#eee;padding:20px}
table{border-collapse:collapse;width:100%}th,td{border:1px solid #444;padding:4px 8px;text-align:center}
th{background:#16213e}tr:nth-child(even){background:#1a1a2e}tr:hover{background:#2a2a4e}
.hit3{color:#0f0;font-weight:bold}.hit2{color:#ff0}.hit1{color:#0cf}.hit0{color:#666}
.stats{display:flex;gap:20px;margin:15px 0}.stat-box{background:#16213e;padding:15px;border-radius:8px;text-align:center;flex:1}
.stat-val{font-size:28px;font-weight:bold;color:#0f0}.stat-label{font-size:12px;color:#888}
#progress{margin:10px 0;color:#ff0}
.bar{height:20px;background:#0f0;border-radius:3px;display:inline-block}
</style>
</head><body>
<h2>v4.1 Top5 命中率 & 开奖号码覆盖率 回测</h2>
<div id="progress">准备中...</div>
<div id="result"></div>
<script src="script.js"></script>
<script>
// 等待script.js加载完成
async function runBacktest() {
  const allDraws = JSON.parse(document.getElementById('drawDataHidden')?.textContent || '[]');
  // all_draws.json可能不在页面中，用全局draws
  if (typeof drawRows === 'undefined' || drawRows === 0) {
    document.getElementById('progress').textContent = '错误：未检测到开奖数据，请先在主页面导入数据';
    return;
  }
  
  const progressEl = document.getElementById('progress');
  const resultEl = document.getElementById('result');
  
  const testStart = Math.max(11, drawRows - 100);
  const testEnd = drawRows - 1;
  const results = [];
  
  for (let srcRow = testStart; srcRow <= testEnd; srcRow++) {
    const nextRow = srcRow + 1;
    if (nextRow > drawRows) break;
    
    progressEl.textContent = `测试中: ${srcRow}/${testEnd} (${((srcRow-testStart)/(testEnd-testStart)*100).toFixed(0)}%)`;
    await new Promise(r => setTimeout(r, 10)); // 让UI更新
    
    try {
      // 1. 调用实际v4.1生成流程
      const pool = buildSampleNumbersV4(srcRow, "front");
      if (!pool || pool.length < 5) continue;
      
      const selectedNums = allDraws ? allDraws[srcRow-1]?.front : null;
      const refRows = buildV4FullReferenceRows(srcRow, collectBalls());
      const sourceTails = [...new Set(pool.map(e => e.number % 10))];
      const transData = analyzeTailTransitionsV4(srcRow, 12, collectBalls());
      const predTails = predictLikelyTailsV4Enhanced(sourceTails, transData, refRows, srcRow, collectBalls());
      const ivPred = predictTargetIntervalRatio(srcRow, intervalRatio(pool.map(e=>e.number)), collectBalls());
      const firstBallPreds = predictFirstBallComprehensive(srcRow, collectBalls());
      
      // 2. 生成前区组合
      const combos = buildSampleFrontCombosV4(pool, refRows, pool.map(e=>e.number), pool.map(e=>e.number), predTails, ivPred);
      if (combos.length < 5) continue;
      
      // 3. 生成Top5
      const backCombos = combos.slice(0, 5).map(c => c); // 简化后区
      const plan = buildV4SingleSamplePlan(combos, backCombos, pool.map(e=>e.number), pool, predTails, firstBallPreds);
      if (plan.length < 5) continue;
      
      // 4. 获取开奖号码
      const allBalls = collectBalls();
      const actualBalls = allBalls.filter(b => b.zone === "front" && b.row === nextRow);
      const actualNums = [...new Set(actualBalls.map(b => b.number))].sort((a,b) => a-b);
      if (actualNums.length !== 5) continue;
      const actualSet = new Set(actualNums);
      
      // 5. 计算命中
      const comboHits = plan.map(variant => {
        const nums = variant.front.numbers || [];
        const hits = nums.filter(n => actualSet.has(n));
        return { numbers: nums, hitLen: hits.length, hits };
      });
      
      // 6. 计算覆盖率
      const allPred = new Set();
      plan.forEach(v => (v.front.numbers||[]).forEach(n => allPred.add(n)));
      const covered = actualNums.filter(n => allPred.has(n));
      
      results.push({
        srcRow, nextRow, actualNums,
        top5: comboHits,
        maxHit: Math.max(...comboHits.map(c=>c.hitLen)),
        avgHit: comboHits.reduce((s,c)=>s+c.hitLen,0)/5,
        cov: covered.length,
        covRate: covered.length/5
      });
      
    } catch(e) {
      console.warn(`第${srcRow}期出错:`, e);
    }
  }
  
  // 统计
  const cnt = results.length;
  if (cnt === 0) { progressEl.textContent = '无有效结果'; return; }
  
  let maxH=0,avgH=0,covT=0,h3=0,h2=0,h1=0;
  results.forEach(r => { maxH+=r.maxHit; avgH+=r.avgHit; covT+=r.covRate; if(r.maxHit>=3)h3++; if(r.maxHit>=2)h2++; if(r.maxHit>=1)h1++; });
  
  progressEl.textContent = `回测完成: 第${testStart}-${testEnd}期`;
  
  resultEl.innerHTML = `
    <div class="stats">
      <div class="stat-box"><div class="stat-val">${(maxH/cnt).toFixed(2)}</div><div class="stat-label">最大命中平均</div></div>
      <div class="stat-box"><div class="stat-val">${(avgH/cnt).toFixed(2)}</div><div class="stat-label">平均命中</div></div>
      <div class="stat-box"><div class="stat-val">${(h3/cnt*100).toFixed(1)}%</div><div class="stat-label">≥3球命中率</div></div>
      <div class="stat-box"><div class="stat-val">${(h2/cnt*100).toFixed(1)}%</div><div class="stat-label">≥2球命中率</div></div>
      <div class="stat-box"><div class="stat-val">${(h1/cnt*100).toFixed(1)}%</div><div class="stat-label">≥1球命中率</div></div>
      <div class="stat-box"><div class="stat-val">${(covT/cnt*100).toFixed(1)}%</div><div class="stat-label">开奖覆盖率</div></div>
    </div>
    <p>评估期数: ${cnt}</p>
    <h3>逐期详情</h3>
    <table>
      <tr><th>源行</th><th>开奖行</th><th>开奖号码</th><th>组合1</th><th>组合2</th><th>组合3</th><th>组合4</th><th>组合5</th><th>最大命中</th><th>覆盖率</th></tr>
      ${results.map(r => `<tr>
        <td>${r.srcRow}</td><td>${r.nextRow}</td><td>${r.actualNums.join(',')}</td>
        ${r.top5.map(c => `<td class="hit${Math.min(c.hitLen,3)}">[${c.numbers.join(',')}] ${c.hitLen}球${c.hitLen>0?':'+c.hits.join(','):''}</td>`).join('')}
        <td class="hit${Math.min(r.maxHit,3)}">${r.maxHit}</td>
        <td>${r.cov}/5 (${(r.covRate*100).toFixed(0)}%)</td>
      </tr>`).join('')}
    </table>
  `;
}

// 页面加载后运行
setTimeout(runBacktest, 2000);
</script>
</body></html>
